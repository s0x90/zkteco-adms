name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Build examples (tagged)
        run: |
          go build -o /dev/null -tags basic_server ./examples/basic_server.go
          go build -o /dev/null ./examples/database_integration.go

      - name: Test
        run: go test -v -race -cover ./...
